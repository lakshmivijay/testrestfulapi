name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    # Step 1: Build WITHOUT tests
    - name: Build (Skip Tests)
      run: mvn clean package -DskipTests

    # Step 2: Run tests with FULL logs
    - name: Run Tests (Verbose)
      run: mvn test -e -X

    # Step 3: Print test report (VERY IMPORTANT)
    - name: Print Test Reports
      if: always()
      run: |
        echo "==== TEST REPORTS ===="
        cat target/surefire-reports/*.txt || true

    - name: Build Docker Image
      run: docker build -t restapi-app .

    - name: Run Docker Container
      run: docker run -d -p 8800:8800 restapi-app
